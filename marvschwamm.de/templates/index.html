<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Server</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- 🌄 Background -->
<div id="bg"></div>
<div id="overlay"></div>

<div id="settings-btn">⚙</div>

<div id="settings-overlay"></div>

<div id="settings-panel" class="glass">

    <div id="settings-header">
        ⚙️ Einstellungen
    </div>

    <div id="settings-body">

        <!-- Linke Leiste -->
        <div id="settings-sidebar">

            <div class="category active" onclick="showTab('language')">
                🌍 Sprache
            </div>

            <div class="category" onclick="showTab('theme')">
                🎨 Theme
            </div>
        </div>

        <!-- Rechter Bereich -->
        <div id="settings-content">

            <div class="tab" id="language-tab">
                <h2>Sprache</h2>

                <button onclick="loadLanguage('de')">
                    Deutsch
                </button>

                <button onclick="loadLanguage('en')">
                    English
                </button>
            </div>

            <div class="tab" id="theme-tab" style="display:none;">
                <h2>Theme</h2>

                <button>Dunkel</button>
            </div>
        </div>
    </div>
</div>

<!-- 🧠 Main Content -->
<div class="glass">
    <div class="title" id="title">Wilkommen auf marvschwamm.de</div>
    <div class="tag">FastAPI</div>
    <div class="tag">Python</div>
    <div class="tag">Webserver</div>
    <div class="tag">HTML</div>
</div>

<!-- JS -->
<script src="/static/js/settings.js"></script>

</body>
</html>
